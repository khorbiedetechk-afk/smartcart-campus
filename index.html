<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SmartCart Campus</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1D9E75;--green-dark:#0F6E56;--green-deep:#0B1F14;
  --green-light:#E1F5EE;--green-mid:#9FE1CB;
  --amber:#D4860A;--amber-light:#FDF3DC;
  --coral:#C84B2F;--coral-light:#FAECE7;
  --blue:#185FA5;--blue-light:#E6F1FB;
  --purple:#534AB7;--purple-light:#EEEDFE;
  --text:#1A2E22;--muted:#4A7060;--border:#C8E6D8;
  --surface:#F7FAF8;--white:#fff;
  --r:12px;--r-sm:8px;
  --sh:0 2px 16px rgba(11,31,20,0.08);
  --sh-lg:0 8px 40px rgba(11,31,20,0.14)
}
html,body{height:100%;font-family:'DM Sans',system-ui,sans-serif;background:#d4e8db;color:var(--text)}
h1,h2,h3,h4{font-family:'Syne',system-ui,sans-serif}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
input,select,textarea{font-family:inherit}
.app{max-width:420px;margin:0 auto;min-height:100vh;background:var(--surface);box-shadow:0 0 60px rgba(0,0,0,.18);position:relative}
.screen{min-height:100vh;padding-bottom:72px;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 1.8s ease infinite}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--sh)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.03em}
.bg{background:var(--green-light);color:var(--green-dark)}
.ba{background:var(--amber-light);color:var(--amber)}
.bc{background:var(--coral-light);color:var(--coral)}
.bb{background:var(--blue-light);color:var(--blue)}
.bp{background:var(--purple-light);color:var(--purple)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 22px;border-radius:var(--r-sm);font-size:14px;font-weight:500;transition:all .18s;border:none}
.btn-p{background:var(--green);color:#fff}.btn-p:hover{background:var(--green-dark)}
.btn-o{background:transparent;color:var(--green);border:1.5px solid var(--green)}.btn-o:hover{background:var(--green-light)}
.btn-d{background:var(--green-deep);color:#fff}
.btn-a{background:var(--amber);color:#fff}
.btn-pu{background:var(--purple);color:#fff}
.btn-lg{padding:15px 28px;font-size:15px;font-weight:600}
.btn:disabled{opacity:.4;cursor:not-allowed}
.pbar{height:6px;background:#deeee6;border-radius:999px;overflow:hidden}
.pfill{height:100%;border-radius:999px;background:var(--green);transition:width .5s ease}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:420px;background:#fff;border-top:1px solid var(--border);display:flex;padding:6px 0 10px;z-index:100;box-shadow:0 -4px 20px rgba(11,31,20,.07)}
.bnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;color:var(--muted);padding:4px 0;font-size:10px;font-weight:500;position:relative}
.bnav button.active{color:var(--green);font-weight:600}
.bnav .ndot{position:absolute;bottom:-6px;width:18px;height:3px;background:var(--green);border-radius:2px}
.tbar{display:flex;align-items:center;padding:14px 16px 10px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.tbar h2{flex:1;font-size:17px;font-weight:700}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);color:#fff;padding:11px 22px;border-radius:var(--r);font-size:13px;font-weight:500;z-index:999;box-shadow:var(--sh-lg);animation:fadeIn .3s ease;max-width:380px;text-align:center;pointer-events:none}
@media(max-width:440px){.bnav{width:100%}.app{box-shadow:none}}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="app" id="app"></div>
<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
const PRODUCTS=[
  {id:1,name:"Indomie Noodles (Box 40)",  cat:"Food",       price:85, gp:55, min:10,img:"🍜",tag:"Best seller"},
  {id:2,name:"A4 Paper Ream",            cat:"Stationery", price:48, gp:32, min:8, img:"📄",tag:"Low stock"},
  {id:3,name:"JBL Go 3 Speaker",         cat:"Gadgets",    price:220,gp:155,min:5, img:"🔊",tag:"Hot deal"},
  {id:4,name:"Liquid Soap 5L",           cat:"Essentials", price:62, gp:40, min:12,img:"🧴",tag:""},
  {id:5,name:"Graph Pad Pack (×5)",      cat:"Stationery", price:35, gp:22, min:6, img:"📓",tag:""},
  {id:6,name:"Rice 25kg",                cat:"Food",       price:340,gp:225,min:4, img:"🌾",tag:"Group only"},
];
const HUBS=["Legon Hall — Block C","Pentagon Hostel","Main Library Steps","Engineering Quad"];

const S={
  screen:"home",product:null,
  groups:{
    1:{joined:7,min:10,t:14400,members:["Ama","Kofi","Yaw","Efua","Kojo","Abena","Kwame"]},
    2:{joined:5,min:8, t:39600,members:["Nana","Adwoa","Kwesi","Akua","Paa"]},
    3:{joined:3,min:5, t:79200,members:["Esi","Mensah","Aba"]},
    4:{joined:10,min:12,t:21600,members:["Akos","Adjei","Bea","Cynthia","David","Emma","Frank","Grace","Hawa","Ifeoma"]},
    5:{joined:4,min:6, t:64800,members:["Jo","Kaf","Lena","Mo"]},
    6:{joined:2,min:4, t:108000,members:["Nana","Osei"]},
  },
  joined:{},hub:HUBS[0],savings:0,orders:[],
  orderRef:"SC-2025-"+Math.random().toString(36).substr(2,6).toUpperCase(),
  student:"Kwame Asante",
  qcChecks:{qty:false,brand:false,cond:false},
  qrVerified:false,rating:0,pinInput:"",orderStage:0,
  sorted:false,dispatched:false,hubArrived:false,notified:false,
  stage4Done:false,tab:"group",searchQ:"",catFilter:"All",
  paying:false,showPostOrder:false,toastMsg:null,toastTimer:null,scanning:false,
};

setInterval(()=>{
  Object.keys(S.groups).forEach(id=>{if(S.groups[id].t>0)S.groups[id].t--;});
  if(["browse","groups","product"].includes(S.screen))render();
},1000);

function toast(msg,type="success"){
  if(S.toastTimer)clearTimeout(S.toastTimer);
  S.toastMsg={msg,type};
  S.toastTimer=setTimeout(()=>{S.toastMsg=null;render();},3200);
  render();
}
function go(screen,extra){
  S.screen=screen;
  if(extra)Object.assign(S,extra);
  render();
  window.scrollTo&&window.scrollTo(0,0);
}
function fmt(s){
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;
  if(h>0)return h+"h "+m+"m";
  return m+"m "+String(sc).padStart(2,"0")+"s";
}
function pct(g){return Math.min(Math.round((g.joined/g.min)*100),100);}
function saving(p){return p.price-p.gp;}

// ── ICONS ────────────────────────────────────────────────────────────────────
function ic(name,size,col){
  col=col||"currentColor"; size=size||20;
  const d={
    home:`<path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>`,
    search:`<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>`,
    users:`<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>`,
    package:`<line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>`,
    settings:`<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>`,
    check:`<polyline points="20 6 9 17 4 12"/>`,
    checkc:`<path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>`,
    arrow:`<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>`,
    back:`<line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>`,
    clock:`<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>`,
    zap:`<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>`,
    truck:`<rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>`,
    map:`<polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/>`,
    qr:`<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="5" y="5" width="3" height="3"/><rect x="16" y="5" width="3" height="3"/><rect x="5" y="16" width="3" height="3"/><rect x="14" y="14" width="3" height="3"/><rect x="18" y="18" width="3" height="3"/>`,
    bell:`<path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/>`,
    robot:`<rect x="3" y="11" width="18" height="10" rx="2"/><path d="M9 11V7a3 3 0 016 0v4"/><circle cx="9" cy="16" r="1"/><circle cx="15" cy="16" r="1"/>`,
    warn:`<path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>`,
    star:`<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>`,
    gift:`<polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7"/>`,
    chart:`<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>`,
    box:`<path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/>`,
    tags:`<path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/>`,
  };
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${col}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${d[name]||""}</svg>`;
}

// ── SHARED HELPERS ────────────────────────────────────────────────────────────
function tbar(title,back,right){
  right=right||"";
  return `<div class="tbar">${back?`<button onclick="go('${back}')" style="background:none;margin-right:10px;color:var(--muted);padding:4px">${ic("back",20,"var(--muted)")}</button>`:""}<h2>${title}</h2>${right}</div>`;
}
function bnav(){
  const noNav=["product","stage3","stage4","stage5","stage6","stage7"];
  if(noNav.includes(S.screen))return "";
  const tabs=[["home","Home","home"],["browse","Shop","search"],["groups","Groups","users"],["orders","Orders","package"],["profile","Profile","settings"]];
  return `<nav class="bnav">${tabs.map(([id,lbl,ico])=>`<button onclick="go('${id}')" class="${S.screen===id?"active":""}">${ic(ico,20,"currentColor")}<span>${lbl}</span>${S.screen===id?`<div class="ndot"></div>`:""}</button>`).join("")}</nav>`;
}
function toastEl(){
  if(!S.toastMsg)return "";
  const bg=S.toastMsg.type==="success"?"var(--green)":S.toastMsg.type==="error"?"var(--coral)":"var(--amber)";
  return `<div class="toast" style="background:${bg}">${S.toastMsg.msg}</div>`;
}
function pcard(p,fn){
  const g=S.groups[p.id],pc=pct(g),met=g.joined>=g.min;
  return `<div class="card" style="margin-bottom:12px;cursor:pointer" onclick="${fn}">
    <div style="display:flex;gap:12px">
      <div style="width:58px;height:58px;background:var(--green-light);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0">${p.img}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;gap:4px;margin-bottom:4px;flex-wrap:wrap">
          <span class="badge bg" style="font-size:10px">${p.cat}</span>
          ${p.tag?`<span class="badge ba" style="font-size:10px">${p.tag}</span>`:""}
          ${met?`<span class="badge bg" style="font-size:10px">✓ Ready</span>`:""}
        </div>
        <p style="font-weight:600;font-size:14px;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</p>
        <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px">
          <span style="font-size:16px;font-weight:800;color:var(--green);font-family:Syne,sans-serif">GHS ${p.gp}</span>
          <span style="font-size:11px;color:var(--muted);text-decoration:line-through">GHS ${p.price}</span>
          <span class="badge bg" style="font-size:10px">-${Math.round(saving(p)/p.price*100)}%</span>
        </div>
        <div class="pbar" style="margin-bottom:4px"><div class="pfill" style="width:${pc}%;background:${met?"var(--green)":"var(--amber)"}"></div></div>
        <p style="font-size:11px;color:var(--muted)">${g.joined}/${g.min} joined · <span style="color:${g.t<3600?"var(--coral)":"inherit"}">${fmt(g.t)} left</span></p>
      </div>
    </div>
  </div>`;
}

// ── SCREENS ──────────────────────────────────────────────────────────────────

function sHome(){
  return `<div style="background:var(--green-deep);padding:22px 16px 26px;color:#fff">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div><p style="font-size:11px;color:var(--green-mid);margin-bottom:2px;letter-spacing:.06em">GOOD MORNING</p><h1 style="font-size:21px;font-weight:800">${S.student} 👋</h1></div>
      <button style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:999px;padding:8px 13px;color:#fff;font-size:12px;display:flex;align-items:center;gap:5px">${ic("bell",13,"#fff")} 3</button>
    </div>
    <div style="background:rgba(29,158,117,.3);border:1px solid rgba(159,225,203,.3);border-radius:var(--r);padding:16px">
      <p style="font-size:10px;color:var(--green-mid);letter-spacing:.06em;margin-bottom:3px">TOTAL SAVED WITH SMARTCART</p>
      <p style="font-size:32px;font-weight:800;font-family:Syne,sans-serif">GHS ${S.savings.toFixed(2)}</p>
      <p style="font-size:12px;color:var(--green-mid);margin-top:3px">💡 Group together to save more</p>
    </div>
  </div>
  <div style="padding:16px">
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px">
      ${[["search","Shop","browse"],["users","Groups","groups"],["truck","Track","stage4"],["qr","Collect","stage7"]].map(([i,l,s])=>`<button onclick="go('${s}')" style="background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:12px 6px;display:flex;flex-direction:column;align-items:center;gap:5px;box-shadow:var(--sh)"><div style="background:var(--green-light);border-radius:8px;padding:8px">${ic(i,17,"var(--green)")}</div><span style="font-size:11px;font-weight:500">${l}</span></button>`).join("")}
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h3 style="font-size:16px;font-weight:700">🔥 Live Group Deals</h3>
      <button onclick="go('browse')" style="background:none;color:var(--green);font-size:13px;font-weight:500">See all</button>
    </div>
    ${PRODUCTS.slice(0,3).map(p=>pcard(p,`go('product',{product:${JSON.stringify(p)}})`)).join("")}
    <div style="background:var(--green-deep);border-radius:var(--r);padding:14px;color:#fff;margin-top:4px">
      <p style="font-size:10px;color:var(--green-mid);letter-spacing:.06em;margin-bottom:7px">ORDER JOURNEY — 7 STAGES</p>
      <div style="display:flex;align-items:center;gap:3px;overflow-x:auto;padding-bottom:2px">
        ${["Browse","Group","Pay","QC","Sort","Hub","Collect"].map((s,i)=>`<div style="display:flex;align-items:center;gap:3px;flex-shrink:0"><div style="background:${i===0?"var(--green)":"rgba(255,255,255,.1)"};border-radius:999px;padding:4px 9px;font-size:11px;font-weight:600;color:${i===0?"#fff":"rgba(255,255,255,.4)"}">${i+1}. ${s}</div>${i<6?`<span style="color:rgba(255,255,255,.2);font-size:11px">›</span>`:""}</div>`).join("")}
      </div>
    </div>
  </div>`;
}

function sBrowse(){
  const cats=["All","Food","Stationery","Gadgets","Essentials"];
  const filtered=PRODUCTS.filter(p=>(S.catFilter==="All"||p.cat===S.catFilter)&&p.name.toLowerCase().includes(S.searchQ.toLowerCase()));
  return `<div style="background:var(--green-deep);padding:16px 16px 14px">
    <h2 style="color:#fff;font-size:18px;font-weight:800;margin-bottom:11px">🛒 Stage 1 — Discovery</h2>
    <div style="position:relative"><span style="position:absolute;left:11px;top:50%;transform:translateY(-50%)">${ic("search",15,"var(--muted)")}</span>
    <input value="${S.searchQ.replace(/"/g,'&quot;')}" oninput="S.searchQ=this.value;render()" placeholder="Search products..." style="width:100%;padding:11px 11px 11px 35px;border-radius:var(--r-sm);border:1px solid var(--border);font-size:14px;outline:none"></div>
  </div>
  <div style="background:linear-gradient(135deg,#EEEDFE,#E6F1FB);padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)">
    <div style="background:var(--purple);border-radius:8px;padding:6px;flex-shrink:0">${ic("robot",14,"#fff")}</div>
    <div style="flex:1"><p style="font-size:12px;font-weight:600;color:var(--purple)">AI Budget Assistant active</p><p style="font-size:11px;color:var(--muted)">Watching for cheaper alternatives</p></div>
    <span class="badge bp pulse">Live</span>
  </div>
  <div style="display:flex;gap:7px;padding:10px 16px;overflow-x:auto">
    ${cats.map(c=>`<button onclick="S.catFilter='${c}';render()" style="padding:7px 13px;border-radius:999px;border:1.5px solid ${S.catFilter===c?"var(--green)":"var(--border)"};background:${S.catFilter===c?"var(--green)":"#fff"};color:${S.catFilter===c?"#fff":"var(--muted)"};font-size:12px;font-weight:500;white-space:nowrap;flex-shrink:0">${c}</button>`).join("")}
  </div>
  <div style="padding:0 16px">${filtered.length?filtered.map(p=>pcard(p,`go('product',{product:${JSON.stringify(p)}})`)).join(""):`<div style="text-align:center;padding:40px;color:var(--muted)">No products found</div>`}</div>`;
}

function sProduct(){
  const p=S.product;
  if(!p)return `<div style="padding:40px;text-align:center"><button class="btn btn-p" onclick="go('browse')">Browse Products</button></div>`;
  const g=S.groups[p.id],pc=pct(g),met=g.joined>=g.min,alreadyIn=S.joined[p.id];
  return `${tbar("Product Detail","browse")}

      <div style="background:var(--green-light);border:2px solid var(--green);border-radius:var(--r);padding:16px;text-align:center;margin-bottom:14px">
        <p style="font-size:10px;color:var(--green-dark);font-weight:600;letter-spacing:.06em">YOU SAVED THIS ORDER</p>
        <p style="font-size:36px;font-weight:800;color:var(--green);font-family:Syne,sans-serif">GHS ${saved.toFixed(2)}</p>
        <p style="font-size:12px;color:var(--green-dark)">vs buying solo</p>
      </div>
      <div class="card" style="margin-bottom:13px">
        <p style="font-size:13px;font-weight:600;margin-bottom:11px">Rate your experience</p>
        <div style="display:flex;gap:7px;justify-content:center;margin-bottom:9px">
          ${[1,2,3,4,5].map(n=>`<button onclick="S.rating=${n};render()" style="background:none;font-size:25px;filter:${S.rating>=n?"none":"grayscale(1)"};transition:filter .2s">⭐</button>`).join("")}
        </div>
        ${S.rating>0?`<p style="text-align:center;font-size:13px;color:var(--green);font-weight:500">${["","Poor","Fair","Good","Great","Excellent!"][S.rating]} — Thanks!</p>`:""}
      </div>
      <div class="card" style="margin-bottom:13px;background:var(--green-deep);border:none;color:#fff">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><p style="font-size:10px;color:var(--green-mid);font-weight:600;margin-bottom:3px">TOTAL LIFETIME SAVINGS</p>
          <p style="font-size:26px;font-weight:800;font-family:Syne,sans-serif">GHS ${S.savings.toFixed(2)}</p>
          <p style="font-size:12px;color:var(--green-mid)">with SmartCart Campus</p></div>
          ${ic("chart",34,"var(--green-mid)")}
        </div>
      </div>
      <div style="background:linear-gradient(135deg,var(--purple-light),var(--blue-light));border:1.5px solid var(--purple);border-radius:var(--r);padding:14px;margin-bottom:16px">
        <div style="display:flex;gap:9px;margin-bottom:7px">${ic("gift",17,"var(--purple)")}<p style="font-weight:600;font-size:14px;color:var(--purple)">Upgrade to SmartCart Pro</p></div>
        <p style="font-size:12px;color:var(--muted);margin-bottom:9px;line-height:1.5">Priority access, full AI reports, early-bird deals every week.</p>
        <button class="btn btn-pu" style="width:100%;font-size:13px">${ic("star",13,"#fff")} Try Pro — GHS 15/month</button>
      </div>
      <button class="btn btn-p btn-lg" style="width:100%" onclick="S.showPostOrder=false;S.qrVerified=false;S.sorted=false;S.dispatched=false;S.hubArrived=false;S.notified=false;S.stage4Done=false;S.qcChecks={qty:false,brand:false,cond:false};S.orderStage=0;S.pinInput='';S.scanning=false;go('home')">${ic("home",15,"#fff")} Back to Home</button>
    </div>`;
  }
  return `${tbar("Stage 7 — Collection")}
  <div style="padding:16px;padding-bottom:30px">
    <div style="text-align:center;margin-bottom:18px">
      <div style="width:60px;height:60px;border-radius:999px;background:var(--green-light);display:flex;align-items:center;justify-content:center;margin:0 auto 10px">${ic("qr",26,"var(--green)")}</div>
      <h3 style="font-size:17px;font-weight:700;margin-bottom:3px">Collect Your Order</h3>
      <p style="font-size:13px;color:var(--muted)">📍 ${S.hub}</p>
    </div>
    ${!S.qrVerified?`
    <div class="card" style="margin-bottom:13px;text-align:center">
      <p style="font-size:13px;font-weight:600;margin-bottom:11px">Scan QR code or enter PIN</p>
      <div style="width:150px;height:150px;margin:0 auto 13px;border-radius:var(--r);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;background:var(--surface)">
        ${S.scanning?`<div class="pulse"><p style="color:var(--green);font-size:13px;font-weight:600">Scanning...</p></div>`:`${ic("qr",54,"var(--border)")}`}
      </div>
      <button class="btn btn-p" style="width:100%;margin-bottom:11px" onclick="S.scanning=true;render();setTimeout(()=>{S.qrVerified=true;S.scanning=false;render();},1800)">${ic("qr",14,"#fff")} Simulate QR Scan</button>
      <div style="color:var(--muted);font-size:12px;margin-bottom:9px">— or enter pickup PIN —</div>
      <input placeholder="Hint: ${pin}" oninput="S.pinInput=this.value.toUpperCase()"
        style="width:100%;padding:12px;border-radius:var(--r-sm);border:1px solid var(--border);font-size:18px;text-align:center;font-family:monospace;letter-spacing:.15em;font-weight:700;outline:none;margin-bottom:9px">
      <button class="btn btn-o" style="width:100%" onclick="if(S.pinInput==='${pin}'){S.qrVerified=true;render();}else{toast('Incorrect PIN — try again','error')}">Verify PIN</button>
    </div>`:`
    <div class="card" style="margin-bottom:13px;border:1.5px solid var(--green)">
      <div style="display:flex;gap:9px;align-items:center;margin-bottom:11px">${ic("checkc",26,"var(--green)")}
        <div><p style="font-size:15px;font-weight:700;color:var(--green-dark)">Identity Verified!</p><p style="font-size:12px;color:var(--muted)">${S.orderRef} · ${S.hub}</p></div>
      </div>
      <div style="display:flex;gap:11px;align-items:center;padding:11px;background:var(--green-light);border-radius:var(--r-sm);margin-bottom:11px">
        <span style="font-size:30px">${p?p.img:"📦"}</span>
        <div><p style="font-weight:600;font-size:14px">${p?p.name:"Your Order"}</p><p style="font-size:12px;color:var(--muted)">Group price: GHS ${p?p.gp:"—"}</p></div>
      </div>
      <div style="background:var(--amber-light);border-radius:var(--r-sm);padding:9px">
        <p style="font-size:12px;color:#6b4a00">⚠️ Confirming releases payment to supplier and closes this order.</p>
      </div>
    </div>
    <button class="btn btn-p btn-lg" style="width:100%" onclick="S.savings+=${p?saving(p):18};toast('✅ Confirmed! Supplier payment released.');S.showPostOrder=true;render()">
      ${ic("checkc",15,"#fff")} Confirm Receipt & Close Order
    </button>`}
  </div>`;
}

function sGroups(){
  return `<div style="background:var(--green-deep);padding:16px 16px 13px;color:#fff">
    <h2 style="font-size:17px;font-weight:800;margin-bottom:3px">👥 Active Group Orders</h2>
    <p style="color:var(--green-mid);font-size:13px">Join before the timer runs out</p>
  </div>
  <div style="padding:16px">
    ${PRODUCTS.map(p=>{
      const g=S.groups[p.id],pc=pct(g),met=g.joined>=g.min,already=S.joined[p.id];
      return `<div class="card" style="margin-bottom:11px">
        <div style="display:flex;gap:11px;margin-bottom:9px">
          <div style="width:44px;height:44px;border-radius:8px;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">${p.img}</div>
          <div style="flex:1"><p style="font-weight:600;font-size:14px;margin-bottom:2px">${p.name}</p>
            <div style="display:flex;align-items:baseline;gap:7px">
              <span style="font-size:14px;font-weight:700;color:var(--green);font-family:Syne,sans-serif">GHS ${p.gp}</span>
              <span style="font-size:11px;color:var(--muted);text-decoration:line-through">GHS ${p.price}</span>
            </div>
          </div>
          ${met?`<span class="badge bg">✓ Ready</span>`:""}
        </div>
        <div class="pbar" style="margin-bottom:4px"><div class="pfill" style="width:${pc}%;background:${met?"var(--green)":"var(--amber)"}"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:10px">
          <span>${g.joined}/${g.min} joined</span>
          <span style="color:${g.t<3600?"var(--coral)":"inherit"}">⏱ ${fmt(g.t)}</span>
        </div>
        <div style="display:flex;gap:7px">
          <button class="btn btn-o" style="flex:1;padding:9px;font-size:12px" onclick="go('product',{product:${JSON.stringify(p)}})">View</button>
          <button class="btn" style="flex:2;padding:9px;font-size:12px;background:${already?"var(--green-light)":"var(--green)"};color:${already?"var(--green-dark)":"#fff"};border:${already?"1.5px solid var(--green)":"none"}"
            onclick="if(!${already}){S.joined[${p.id}]=true;S.groups[${p.id}].joined++;toast('Joined '+${JSON.stringify(p.name)});render()}">
            ${already?"✓ Joined":"Join Group"}
          </button>
        </div>
      </div>`;
    }).join("")}
  </div>`;
}

function sOrders(){
  return `${tbar("My Orders")}
  <div style="padding:16px">
    ${S.orders.length===0?`<div style="text-align:center;padding:55px 20px">${ic("package",44,"var(--border)")}<p style="color:var(--muted);margin-top:11px;font-size:14px">No orders yet</p><button class="btn btn-p" style="margin-top:14px" onclick="go('browse')">Start Shopping</button></div>`
    :S.orders.map(o=>`<div class="card" style="margin-bottom:11px">
      <div style="display:flex;gap:9px;margin-bottom:9px">
        <span style="font-size:28px">${o.product.img}</span>
        <div style="flex:1"><p style="font-weight:600;font-size:14px">${o.product.name}</p><p style="font-size:12px;color:var(--muted)">${o.hub}</p><p style="font-size:10px;font-family:monospace;color:var(--muted)">${o.ref}</p></div>
        <div style="text-align:right"><p style="font-weight:700;color:var(--green);font-size:14px">GHS ${o.price}</p><span class="badge ${o.isSolo?"ba":"bg"}">${o.isSolo?"Solo":"Group"}</span></div>
      </div>
      <div style="display:flex;gap:7px">
        <button class="btn btn-o" style="flex:1;padding:9px;font-size:12px" onclick="go('stage4')">Track</button>
        <button class="btn btn-p" style="flex:1;padding:9px;font-size:12px" onclick="go('stage7')">Collect</button>
      </div>
    </div>`).join("")}
  </div>`;
}

function sProfile(){
  return `${tbar("My Profile")}
  <div style="padding:16px">
    <div style="display:flex;gap:13px;align-items:center;margin-bottom:20px">
      <div style="width:56px;height:56px;border-radius:999px;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff">KA</div>
      <div><h3 style="font-size:16px;font-weight:700">${S.student}</h3><p style="font-size:13px;color:var(--muted)">UPSA — Level 300</p><span class="badge bg">SmartCart Member</span></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:18px">
      ${[["GHS "+S.savings.toFixed(0),"Saved","var(--green)"],
         [S.orders.length,"Orders","var(--blue)"],
         [Object.keys(S.joined).length,"Groups","var(--purple)"]].map(([v,l,c])=>`
      <div style="background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:12px;text-align:center">
        <p style="font-size:19px;font-weight:800;color:${c};font-family:Syne,sans-serif">${v}</p>
        <p style="font-size:11px;color:var(--muted);margin-top:2px">${l}</p>
      </div>`).join("")}
    </div>
    <div class="card">
      ${[["bell","Notifications"],["map","Saved Hubs"],["chart","Spending Report"],["gift","Upgrade to Pro"],["tags","Referral Bonus"]].map(item=>`
      <div style="display:flex;align-items:center;gap:11px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer">
        <div style="width:32px;height:32px;border-radius:8px;background:var(--green-light);display:flex;align-items:center;justify-content:center;flex-shrink:0">${ic(item[0],16,"var(--green)")}</div>
        <span style="flex:1;font-size:14px;font-weight:500">${item[1]}</span>${ic("arrow",15,"var(--muted)")}
      </div>`).join("")}
    </div>
  </div>`;
}

// ── ROUTER ────────────────────────────────────────────────────────────────────
const screens={home:sHome,browse:sBrowse,product:sProduct,stage3:sStage3,stage4:sStage4,stage5:sStage5,stage6:sStage6,stage7:sStage7,groups:sGroups,orders:sOrders,profile:sProfile};

function render(){
  const fn=screens[S.screen]||sHome;
  document.getElementById("app").innerHTML=`${toastEl()}<div class="screen">${fn()}</div>${bnav()}`;
}
window.go=go; window.S=S; window.render=render; window.toast=toast;
render();
</script>
</body>
</html>
